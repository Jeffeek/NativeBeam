# Codecov configuration. https://docs.codecov.com/docs/codecov-yaml
#
# Coverage gates: the project (overall) lane targets 80%; the patch lane gates
# the PR's introduced lines at the same level so regressions in new code are
# caught even when overall coverage is otherwise healthy.
codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 1
  round: down
  range: "70...90"
  status:
    project:
      default:
        target: 80%
        threshold: 1%   # tolerance — small dips don't fail the run
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true   # only post a comment when coverage actually shifts

# Coverage signal is meaningful for the library, not for samples or tests.
ignore:
  - "samples/**"
  - "tests/**"
  - "**/obj/**"
  - "**/bin/**"
