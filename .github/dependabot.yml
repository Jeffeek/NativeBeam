version: 2
updates:
  # NuGet package updates for the library, samples, and tests.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
      xunit:
        patterns:
          - "xunit*"
          - "Xunit.*"
      coverage:
        patterns:
          - "coverlet.*"

  # GitHub Actions kept current — same cadence so PR review batches align.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
