name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [master, release/**]
  push:
    branches: [master, release/**]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  quick-test:
    name: Quick Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET environment
        uses: ./.github/actions/dotnet-setup

      - name: Install Chromium
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Export CHROME_PATH
        shell: bash
        run: echo "CHROME_PATH=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Test
        run: dotnet test NativeBeam.slnx -c Release --no-build --verbosity normal
        timeout-minutes: 12

  test-with-coverage:
    name: Test with Coverage (Ubuntu)
    runs-on: ubuntu-latest
    needs: quick-test

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET environment
        uses: ./.github/actions/dotnet-setup

      - name: Install Chromium
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Export CHROME_PATH
        shell: bash
        run: echo "CHROME_PATH=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Run tests with coverage
        run: >-
          dotnet test NativeBeam.slnx -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
        timeout-minutes: 12

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: ./coverage
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          flags: ubuntu-latest
          fail_ci_if_error: false
          verbose: true

  codeql-analysis:
    name: CodeQL Security Analysis
    needs: quick-test
    permissions:
      security-events: write
      actions: read
      contents: read
    uses: ./.github/workflows/codeql.yml
