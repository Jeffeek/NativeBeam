name: Dependency Review

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce a high or critical vulnerability.
          fail-on-severity: high
          # Comment the diff summary into the PR only when the gate fails;
          # otherwise the action stays quiet.
          comment-summary-in-pr: on-failure
          # Permissive license allow-list for an MIT-licensed library. Add
          # explicit entries here rather than relaxing fail-on-severity.
          allow-licenses: >-
            MIT,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            MPL-2.0,
            ISC,
            Unlicense,
            0BSD
          # Surface advisories from the GitHub Advisory Database.
          vulnerability-check: true
