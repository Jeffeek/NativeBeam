name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push_to_nuget:
        description: 'Push the produced .nupkg to NuGet.org'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$tag' does not match v<semver>." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore NativeBeam.slnx

      - name: Build
        run: dotnet build NativeBeam.slnx --no-restore -c Release /p:Version=${{ steps.version.outputs.version }}

      - name: Install Chromium
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Export CHROME_PATH
        run: echo "CHROME_PATH=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Test
        run: dotnet test NativeBeam.slnx --no-build -c Release

      - name: Validate Native AOT publish (linux-x64)
        run: |
          dotnet publish samples/NativeBeam.Demo/NativeBeam.Demo.csproj \
            -c Release \
            -r linux-x64 \
            /p:PublishAot=true \
            /p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: |
          # PACK_COMMANDS_START
          dotnet pack src/NativeBeam.Pdf/NativeBeam.Pdf.csproj \
            --no-build \
            -c Release \
            -o artifacts \
            /p:Version=${{ steps.version.outputs.version }}
          # PACK_COMMANDS_END

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkg-${{ steps.version.outputs.version }}
          path: artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Push to NuGet.org
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_to_nuget }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "::warning::NUGET_API_KEY secret not configured; skipping push. Artifact 'nupkg-${{ steps.version.outputs.version }}' is available for manual upload."
            exit 0
          fi
          dotnet nuget push 'artifacts/*.nupkg' \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
