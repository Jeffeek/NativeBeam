name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Runs Tuesday 04:23 UTC; offset from the hour to avoid runner-pool spikes.
    - cron: '23 4 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [csharp, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality is the broader pack: security findings + maintainability.
          queries: security-and-quality

      - name: Build (manual mode)
        if: matrix.language == 'csharp'
        run: |
          dotnet restore
          dotnet build src/NativeBeam.Pdf/NativeBeam.Pdf.csproj \
            --no-restore --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
